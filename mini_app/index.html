<script>
(async function loadUnified() {
    await window.NASRIUM_I18N.init();
    await new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = "static/js/app_logic.js?v=" + Date.now();
        s.onload = resolve;
        s.onerror = reject;
        document.body.appendChild(s);
    });
    console.log("Unified app_logic.js loaded");
    if (typeof window.initGame === 'function') {
        window.initGame();
    } else {
        console.error("window.initGame is not defined!");
    }
})();
</script>
<script>
    async function initSingularity() {
        try {
            const res = await fetch('/api/world/singularity/sync', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user_id: userId })
            });
            const data = await res.json();
            if(data.success) {
                const o = data.overview;
                document.getElementById('hub-honor').innerText = o.global_honor.toLocaleString();
                document.getElementById('hub-tier').innerText = o.prestige_tier.toUpperCase();
                console.log("Purified Modules:", data.purified_modules);
            }
        } catch(e) {}
    }
</script></body>
